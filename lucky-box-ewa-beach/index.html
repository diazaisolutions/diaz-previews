<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Box Ewa Beach — concept</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif}
.nav{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:20px 30px}
.brand{font-family:'Fraunces', serif;color:#fff;font-weight:600;font-size:20px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.nl{display:flex;align-items:center;gap:24px}
.nl a{font-size:14px;color:#fff;text-decoration:none;font-weight:500;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.nl .cta{background:#e8623d;text-shadow:none;padding:9px 20px;border-radius:30px;font-weight:600}
.hero{position:relative;height:100vh;min-height:560px;overflow:hidden;display:flex;align-items:flex-end}
.photo{position:absolute;inset:0;background:url('hero.png') center/cover no-repeat}
.photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,0) 32%,rgba(0,0,0,.66) 100%)}
.pnote{position:absolute;top:64px;left:50%;transform:translateX(-50%);z-index:6;background:rgba(0,0,0,.5);color:#fff;font-size:11px;font-style:italic;padding:5px 12px;border-radius:5px}
.ht{position:relative;z-index:4;padding:0 0 56px 44px;max-width:640px}
.eb{color:rgba(255,255,255,.92);font-size:15px;font-weight:500;margin-bottom:14px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.hl{font-family:'Fraunces', serif;color:#fff;font-weight:600;font-size:58px;line-height:1.03;text-shadow:0 2px 16px rgba(0,0,0,.4)}
.hbtn{margin-top:24px;display:inline-block;background:#e8623d;color:#fff;font-weight:600;font-size:15px;padding:14px 32px;border-radius:32px;text-decoration:none}
</style></head><body>
<div class="hero">
  <div class="photo"></div>
  <div class="pnote">concept preview — the final site uses Lucky Box Ewa Beach's real photos</div>
  <div class="nav">
    <div class="brand">Lucky Box Ewa Beach</div>
    <div class="nl"><a>Menu</a><a>Our Story</a><a class="cta">Grab Now</a></div>
  </div>
  <div class="ht">
    <div class="eb">Ewa Beach Bites Made with Aloha</div>
    <h1 class="hl">Your Happy Hour Starts Here</h1>
    <a class="hbtn">Grab Now &rarr;</a>
  </div>
</div>
</body></html>
